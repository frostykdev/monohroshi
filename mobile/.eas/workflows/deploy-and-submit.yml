name: Build and Submit iOS on dev push

on:
  push:
    branches: ['dev']

jobs:
  build_ios:
    name: Build iOS
    type: build
    params:
      platform: ios
      profile: production

  submit_ios:
    name: Submit iOS to App Store
    type: submit
    needs: [build_ios]
    env:
      EXPO_DEBUG: '1'
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
